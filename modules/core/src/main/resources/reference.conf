{
  "license" {
    "accept": "false"
    "accept": ${?ACCEPT_LIMITED_USE_LICENSE}
  }
  "input": {
    "appName": "snowplow-elasticsearch-loader"
  }
  "output": {
    "good": {
      "indexTimeout": "1 minute"
      "auth": {
        "serviceSigningName": "es"
      }
      "additionalBadRowErrorTypes": []
    }
  }
  "streams": {}
  "batching": {
    "maxBytes": 10000000
    "maxDelay": "1 second"
  }
  "retries": {
    "transientErrors": {
      "delay": "1 second"
      "attempts": 5
    }
  }
  "cpuParallelismFactor": 1
  "uploadParallelismFactor": 4
  "decompression": {
    "maxBytesInBatch": 5242880
    "maxBytesSinglePayload": 10000000
  }
  "monitoring": {
    "metrics": {
      "statsd": ${snowplow.defaults.statsd}
      "prometheus": ${snowplow.defaults.prometheus}
    }
    "sentry": ${snowplow.defaults.sentry}
    "healthProbe": {
      "port": 8000
      "unhealthyLatency": "2 minutes"
    }
  }
  "telemetry": ${snowplow.defaults.telemetry}
  "http": {
    "client": ${snowplow.defaults.http.client}
  }
}